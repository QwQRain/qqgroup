<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>领取SVIP - FYF | 小妹妹你挺狂呀</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #1e1e1e;
            border-radius: 16px;
            width: 100%;
            max-width: 360px;
            padding: 24px 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            text-align: center;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .avatar-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #3a3a3a;
        }
        .group-info h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .group-id {
            font-size: 14px;
            color: #aaa;
        }
        .copy-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 18px;
        }
        .vip-banner {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
        }
        .vip-banner:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 215, 0, 0.4);
        }
        .vip-text {
            text-align: left;
        }
        .vip-title {
            font-size: 18px;
            font-weight: 700;
            color: #000;
            margin-bottom: 4px;
        }
        .vip-desc {
            font-size: 14px;
            color: #333;
        }
        .vip-icon {
            font-size: 32px;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .instructions {
            background: #2d2d2d;
            border-radius: 10px;
            padding: 16px;
            margin-top: 20px;
            font-size: 14px;
            color: #ccc;
            line-height: 1.6;
        }
        .instructions strong {
            color: #ffd700;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #4CAF50;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar-group">
                <!-- 你可以替换这里的头像图片URL -->
                <img src="https://i.imgur.com/placeholder.png" alt="头像" class="avatar">
                <div class="group-info">
                    <h2>FYF | 小妹妹你挺狂呀</h2>
                    <div class="group-id">群号：1077873719</div>
                </div>
            </div>
            <button class="copy-btn" onclick="copyGroupID()">📋</button>
        </div>

        <div class="vip-banner" onclick="handleVIPClick()">
            <div class="vip-text">
                <div class="vip-title">🎁 赠送你365天 SVIP</div>
                <div class="vip-desc">点击立即领取，限时福利！</div>
            </div>
            <div class="vip-icon"></div>
        </div>

        <div class="instructions">
            <strong>📌 操作步骤：</strong><br>
            1. 点击上方“领取SVIP”按钮<br>
            2. 系统会自动复制群号 <strong>1077873719</strong><br>
            3. 打开QQ → 搜索群号 → 申请加入<br>
            <small>（因平台限制，无法直接跳转加群，请手动操作）</small>
        </div>

        <div class="footer">
            本页面为模拟演示，非腾讯官方活动<br>
            请勿泄露个人信息或支付密码
        </div>
    </div>

    <div id="toast" class="toast">✅ 群号已复制！请打开QQ搜索加入</div>

    <script>
        const GROUP_ID = "1077873719";

        function copyGroupID() {
            navigator.clipboard.writeText(GROUP_ID).then(() => {
                showToast("群号已复制：" + GROUP_ID);
            }).catch(err => {
                console.error('复制失败:', err);
                alert("请手动复制群号：" + GROUP_ID);
            });
        }

        function handleVIPClick() {
            copyGroupID();
            setTimeout(() => {
                window.location.href = `mqqapi://card/show_pslcard?src_type=internal&version=1&uin=${GROUP_ID}&card_type=group&source=qrcode`;
            }, 1500);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
